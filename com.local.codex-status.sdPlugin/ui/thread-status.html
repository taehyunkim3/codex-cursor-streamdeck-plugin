<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Codex Session Settings</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f3f4f6;
      background: #202124;
    }

    body {
      margin: 0;
      padding: 16px;
      font-size: 13px;
    }

    label {
      display: block;
      margin: 0 0 14px;
    }

    span {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    input {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #4b5563;
      border-radius: 6px;
      padding: 8px 10px;
      color: #f9fafb;
      background: #111827;
      font: inherit;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 14px;
    }

    .row span {
      margin: 0;
    }
  </style>
</head>
<body>
  <label>
    <span>Session slot</span>
    <input id="slot" type="number" min="1" max="99" step="1" placeholder="1">
  </label>

  <label>
    <span>Deck columns</span>
    <input id="deckColumns" type="number" min="1" max="8" step="1" placeholder="3">
  </label>

  <label>
    <span>Codex home</span>
    <input id="codexHome" type="text" placeholder="~/.codex">
  </label>

  <label>
    <span>Recent window minutes</span>
    <input id="recentMinutes" type="number" min="1" max="240" step="1" placeholder="10">
  </label>

  <label>
    <span>Text scale (%)</span>
    <input id="fontScale" type="number" min="60" max="160" step="5" placeholder="100">
  </label>

  <label>
    <span>Project font size</span>
    <input id="projectFontSize" type="number" min="8" max="28" step="1" placeholder="15">
  </label>

  <label>
    <span>Title font size</span>
    <input id="titleFontSize" type="number" min="8" max="32" step="1" placeholder="20">
  </label>

  <label>
    <span>Active message font size</span>
    <input id="activeMessageFontSize" type="number" min="8" max="32" step="1" placeholder="18">
  </label>

  <label>
    <span>Bottom message font size</span>
    <input id="footerMessageFontSize" type="number" min="7" max="24" step="1" placeholder="12">
  </label>

  <label class="row">
    <input id="showArchived" type="checkbox">
    <span>Show archived sessions</span>
  </label>

  <script>
    let websocket;
    let context;
    let settings = {};

    const inputs = {
      slot: document.getElementById("slot"),
      deckColumns: document.getElementById("deckColumns"),
      codexHome: document.getElementById("codexHome"),
      recentMinutes: document.getElementById("recentMinutes"),
      fontScale: document.getElementById("fontScale"),
      projectFontSize: document.getElementById("projectFontSize"),
      titleFontSize: document.getElementById("titleFontSize"),
      activeMessageFontSize: document.getElementById("activeMessageFontSize"),
      footerMessageFontSize: document.getElementById("footerMessageFontSize"),
      showArchived: document.getElementById("showArchived")
    };

    function connectElgatoStreamDeckSocket(port, propertyInspectorUuid, registerEvent, info, actionInfo) {
      const parsedActionInfo = JSON.parse(actionInfo);
      context = parsedActionInfo.context;
      settings = parsedActionInfo.payload.settings || {};
      render();

      websocket = new WebSocket(`ws://127.0.0.1:${port}`);
      websocket.addEventListener("open", () => {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUuid }));
      });
      websocket.addEventListener("message", (event) => {
        const message = JSON.parse(event.data);
        if (message.event === "didReceiveSettings") {
          settings = message.payload.settings || {};
          render();
        }
      });
    }

    function render() {
      inputs.slot.value = settings.slot || "";
      inputs.deckColumns.value = settings.deckColumns || "";
      inputs.codexHome.value = settings.codexHome || "";
      inputs.recentMinutes.value = settings.recentMinutes || "";
      inputs.fontScale.value = settings.fontScale || "";
      inputs.projectFontSize.value = settings.projectFontSize || "";
      inputs.titleFontSize.value = settings.titleFontSize || "";
      inputs.activeMessageFontSize.value = settings.activeMessageFontSize || "";
      inputs.footerMessageFontSize.value = settings.footerMessageFontSize || "";
      inputs.showArchived.checked = Boolean(settings.showArchived);
    }

    function save() {
      settings = {
        slot: Number(inputs.slot.value) || undefined,
        deckColumns: Number(inputs.deckColumns.value) || undefined,
        codexHome: inputs.codexHome.value.trim() || undefined,
        recentMinutes: Number(inputs.recentMinutes.value) || undefined,
        fontScale: Number(inputs.fontScale.value) || undefined,
        projectFontSize: Number(inputs.projectFontSize.value) || undefined,
        titleFontSize: Number(inputs.titleFontSize.value) || undefined,
        activeMessageFontSize: Number(inputs.activeMessageFontSize.value) || undefined,
        footerMessageFontSize: Number(inputs.footerMessageFontSize.value) || undefined,
        showArchived: inputs.showArchived.checked || undefined
      };

      if (websocket && context) {
        websocket.send(JSON.stringify({
          event: "setSettings",
          context,
          payload: settings
        }));
      }
    }

    Object.values(inputs).forEach((input) => {
      input.addEventListener("change", save);
      input.addEventListener("keyup", save);
    });
  </script>
</body>
</html>
